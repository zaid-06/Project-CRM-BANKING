services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: bankfinance_crm
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: crm_pass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: bankfinance-backend
    env_file:
      - ./backend/.env
    environment:
      # Ensure DB_HOST/DB_PORT in .env are correct; these override if set
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./BankingApp
      args:
        # Must be defined in your environment or .env (root)
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL}
    container_name: bankfinance-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
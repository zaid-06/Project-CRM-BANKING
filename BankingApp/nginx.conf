server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Optional: serve static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico)$ {
        try_files $uri /index.html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
